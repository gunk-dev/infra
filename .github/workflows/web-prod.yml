name: Deploy Web Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: gunk-dev/armstrong/.github/workflows/deploy-fly.yml@main
    with:
      app-name: gunk-web-prod
      cue-path: ./apps/web
      environment: prod
      nix-target: web-oci-image
      image-name: gunk-web
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
