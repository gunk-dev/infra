name: Deploy Balance Preview

on:
  repository_dispatch:
    types: [balance-preview, balance-preview-cleanup]

permissions: {}

jobs:
  preview:
    if: github.event.action == 'balance-preview'
    uses: gunk-dev/armstrong/.github/workflows/preview-fly.yml@b27877e3fcbddb494a9f675aab36785c26138736 # main
    with:
      app-prefix: balance-preview
      cue-path: ./apps/balance
      nix-target: balance-oci-image
      nix-input-name: balance
      image-name: balance
      source-repo: gunk-dev/balance
      pr-number: ${{ github.event.client_payload.pr_number }}
      head-sha: ${{ github.event.client_payload.head_sha }}
      action: deploy
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  cleanup:
    if: github.event.action == 'balance-preview-cleanup'
    uses: gunk-dev/armstrong/.github/workflows/preview-fly.yml@b27877e3fcbddb494a9f675aab36785c26138736 # main
    with:
      app-prefix: balance-preview
      cue-path: ./apps/balance
      nix-target: balance-oci-image
      nix-input-name: balance
      image-name: balance
      source-repo: gunk-dev/balance
      pr-number: ${{ github.event.client_payload.pr_number }}
      action: cleanup
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
