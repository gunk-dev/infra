name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check Nix formatting
        run: nix develop -c nixfmt --check .

      - name: Flake check
        run: nix flake check

  validate-cue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Validate CUE schemas
        run: |
          for app in flux balance web; do
            nix develop -c cue vet ./apps/${app} -t staging
            nix develop -c cue vet ./apps/${app} -t prod
            nix develop -c cue vet ./apps/${app} -t preview
          done

      - name: Verify staging export
        run: |
          nix develop -c cue export ./apps/flux -t staging -e staging --out toml > /dev/null
          nix develop -c cue export ./apps/balance -t staging -e staging --out toml > /dev/null
          nix develop -c cue export ./apps/web -t staging -e staging --out toml > /dev/null

      - name: Verify prod export
        run: |
          nix develop -c cue export ./apps/flux -t prod -e prod --out toml > /dev/null
          nix develop -c cue export ./apps/balance -t prod -e prod --out toml > /dev/null
          nix develop -c cue export ./apps/web -t prod -e prod --out toml > /dev/null

      - name: Verify preview export
        run: |
          nix develop -c cue export ./apps/flux -t preview -e preview --out toml > /dev/null
          nix develop -c cue export ./apps/balance -t preview -e preview --out toml > /dev/null
          nix develop -c cue export ./apps/web -t preview -e preview --out toml > /dev/null

      - name: Validate DNS config
        run: |
          nix develop -c cue vet ./dns
          nix develop -c cue export ./dns --out json > /dev/null

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: oci-image
            name: flux
          - image: web-oci-image
            name: gunk-web
          - image: balance-oci-image
            name: balance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Build OCI image (${{ matrix.name }})
        run: nix build .#${{ matrix.image }}

      - name: Smoke test image (${{ matrix.name }})
        run: |
          docker load < result
          docker run -d --name smoke-test -p 8080:8080 ${{ matrix.name }}:latest
          sleep 3
          curl -f http://localhost:8080/ || (docker logs smoke-test && exit 1)
          docker stop smoke-test
          docker rm smoke-test

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31.10.5
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            accept-flake-config = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Security lint GitHub Actions
        run: nix run nixpkgs#zizmor -- . --no-online-audits
