name: Deploy Balance Staging

on:
  push:
    branches: [main]
    paths:
      - 'flake.lock'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: gunk-dev/armstrong/.github/workflows/deploy-fly.yml@main
    with:
      app-name: balance-staging
      cue-path: ./apps/balance
      environment: staging
      nix-target: balance-oci-image
      image-name: balance
      health-check-path: /api/health
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
