name: Deploy Flux Production

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    uses: gunk-dev/armstrong/.github/workflows/deploy-fly.yml@b27877e3fcbddb494a9f675aab36785c26138736 # main
    with:
      app-name: flux-prod
      cue-path: ./apps/flux
      environment: prod
      nix-target: oci-image
      image-name: flux
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
